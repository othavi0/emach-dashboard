name: Mirror to deploy repo

# Espelha a main deste repo (canônico) para emach-ferramentas/emach-dashboard,
# que está conectado à Vercel e tem GitHub Actions desabilitado (só deploya).
# Sem isso, todo deploy exige um push manual cross-account.
#
# Requer o secret MIRROR_TOKEN: o MESMO PAT fine-grained da conta
# emach-ferramentas usado pelo mirror do ecommerce, com escopo ampliado para
# cobrir os dois repos de deploy (emach-dashboard e emach-ecommerce), com
# "Contents: Read and write" + "Workflows: Read and write" (o último é exigido
# pelo GitHub para pushes que tocam .github/workflows).
#
# workflow_dispatch permite disparar o sync inicial (ou um catch-up) na mão,
# sem esperar o próximo push na main.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Sem isto, o checkout grava um http.extraheader com o GITHUB_TOKEN
          # deste repo, que tem precedência sobre o MIRROR_TOKEN no push e causa
          # "permission denied" no repo de destino.
          persist-credentials: false
      - name: Push para emach-ferramentas/emach-dashboard
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "::warning::MIRROR_TOKEN ausente — pulando mirror. Amplie o escopo do PAT do mirror do ecommerce (conta emach-ferramentas) para incluir este repo de deploy e cadastre-o como secret."
            exit 0
          fi
          git push "https://x-access-token:${MIRROR_TOKEN}@github.com/emach-ferramentas/emach-dashboard.git" HEAD:main
