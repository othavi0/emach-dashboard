name: Forms error guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install

      - name: Self-test da regra
        # Falha se a regra não carregar (ast-grep test sai 0 com "0 passed" quando
        # a config/regra some — sem este guard o CI ficaria verde sem enforcement).
        run: |
          out="$(bun guard:forms:test 2>&1)"
          echo "$out"
          echo "$out" | grep -qE '[1-9][0-9]* passed' || {
            echo "::error::regra raw-validation-error não carregou (0 casos testados)"
            exit 1
          }

      - name: Scan dos forms
        run: bun guard:forms
