# Lefthook — git hooks para o monorepo emach-dashboard
# Docs: https://lefthook.dev/configuration/
#
# O hook `pre-commit` espelha o PostToolUse do harness Claude Code
# (.claude/settings.json: `bun fix`), tornando o auto-format consistente
# para commits humanos e outros clientes git.
#
# ATENÇÃO: não remover o PostToolUse do harness — lefthook e harness são
# complementares (harness roda em Write/Edit; lefthook roda no git commit).
# Os dois são idempotentes juntos.

pre-commit:
  commands:
    react-doctor:
      # bunx: o binário de node_modules/.bin não está no PATH do hook —
      # a forma crua falhava silenciosa com "react-doctor: command not found".
      run: react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX"); if bunx react-doctor --staged --blocking warning > "$react_doctor_output" 2>&1; then rm -f "$react_doctor_output"; else cat "$react_doctor_output" >&2; rm -f "$react_doctor_output"; printf "%s\n" "React Doctor found staged regressions." "Run bunx react-doctor --staged --blocking warning to inspect." "Want them fixed? Ask your agent to run that command and resolve the findings." >&2; fi
  jobs:
    - name: lint-fix
      run: bun fix
    - name: stage-fixes
      run: git add -u
